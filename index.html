<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceGame - Match Faces to Names</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- Game Header -->
        <header class="game-header">
            <div class="score">Score: <span id="score">10</span></div>
            <div class="timer">Time: <span id="timer">0</span>s</div>
        </header>

        <!-- Main Game Area -->
        <main class="game-area">
            <!-- Name above image -->
            <div class="name-top" id="nameTop">Name 1</div>
            
            <!-- Face Image Container -->
            <div class="face-container">
                <img src="placeholder.jpg" alt="Face" id="faceImage" class="face-image">
            </div>
            
            <!-- Name below image -->
            <div class="name-bottom" id="nameBottom">Name 2</div>
        </main>

        <!-- Game Controls -->
        <div class="game-controls">
            <button id="startGame" class="btn-primary">Start Game</button>
            <div class="mode-selector">
                <button id="easyMode" class="btn-secondary">Easy Mode</button>
                <button id="hardMode" class="btn-secondary">Hard Mode</button>
            </div>
        </div>

        <!-- Game Over Modal -->
        <div id="gameOverModal" class="modal hidden">
            <div class="modal-content">
                <h2>Game Over!</h2>
                <p>Your highest score: <span id="highScore">0</span></p>
                <button id="playAgain" class="btn-primary">Play Again</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
